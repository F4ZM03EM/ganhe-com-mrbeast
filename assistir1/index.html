<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assista o vídeo · MrBeast</title>
    <style>
        /* Reset e estilos base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Logo */
        .logo {
            height: 80px;
            width: auto;
        }

        /* Saldo */
        .balance-badge {
            margin-top: 12px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #f0fdf4;
            padding: 6px 16px;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 700;
            color: #15803d;
            border: 1px solid #bbf7d0;
        }

        /* Títulos */
        .task-label {
            margin-top: 24px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #737373;
        }

        .task-title {
            margin-top: 8px;
            font-size: 1.875rem;
            font-weight: 900;
            letter-spacing: -0.025em;
            color: #171717;
            text-align: center;
        }

        .task-description {
            margin-top: 8px;
            font-size: 0.875rem;
            color: #525252;
            text-align: center;
        }

        .task-description b {
            color: #171717;
        }

        /* Card do vídeo */
        .video-card {
            margin-top: 24px;
            width: 100%;
            border-radius: 16px;
            border: 1px solid #e5e5e5;
            overflow: hidden;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .video-thumbnail {
            width: 100%;
            display: block;
        }

        .video-info {
            padding: 12px 16px;
            background-color: #ffffff;
        }

        .video-title {
            font-size: 0.875rem;
            font-weight: 700;
            color: #171717;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-meta {
            margin-top: 4px;
            font-size: 0.75rem;
            color: #737373;
        }

        /* Botões */
        .buttons-wrapper {
            margin-top: 32px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-like,
        .btn-dislike {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 20px 16px;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s ease;
        }

        .btn-like:hover,
        .btn-dislike:hover {
            transform: scale(1.02);
        }

        .btn-like:active,
        .btn-dislike:active {
            transform: scale(0.98);
        }

        .btn-like {
            background: #dc2626;
            color: white;
        }

        .btn-dislike {
            background: #e5e5e5;
            color: #262626;
        }

        .btn-like:disabled,
        .btn-dislike:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-icon {
            width: 28px;
            height: 28px;
            flex-shrink: 0;
        }

        .btn-like .btn-icon {
            stroke: white;
        }

        .btn-dislike .btn-icon {
            stroke: #262626;
        }

        /* SVG inline para os ícones */
        .icon-thumbs-up,
        .icon-thumbs-down {
            width: 28px;
            height: 28px;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            flex-shrink: 0;
        }

        .icon-thumbs-up {
            stroke: currentColor;
        }

        .icon-thumbs-down {
            stroke: currentColor;
        }

        /* Responsividade */
        @media (max-width: 640px) {
            .task-title {
                font-size: 1.5rem;
            }
            
            .logo {
                height: 60px;
            }

            .buttons-wrapper {
                gap: 8px;
            }

            .btn-like,
            .btn-dislike {
                padding: 16px 12px;
                font-size: 0.875rem;
            }

            .btn-icon {
                width: 24px;
                height: 24px;
            }

            .icon-thumbs-up,
            .icon-thumbs-down {
                width: 24px;
                height: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo -->
        <img src="../imagem/mrbeast-logo.png" alt="Mr Beast Money Program" class="logo">

        <!-- Saldo -->
        <div class="balance-badge">
            Saldo: $300.00
        </div>

        <!-- Títulos -->
        <div class="task-label">Tarefa 2 de 6</div>
        <h1 class="task-title">Você gostou do vídeo?</h1>
        <p class="task-description">
            Avalie o vídeo abaixo e ganhe <b>$50</b>.
        </p>

        <!-- Card do vídeo -->
        <div class="video-card">
            <img 
                src="../imagem/hqdefault.avif" 
                alt="Eu Sobrevivi 50 Horas em uma Ilha Deserta" 
                class="video-thumbnail"
            >
            <div class="video-info">
                <div class="video-title">Eu Sobrevivi 50 Horas em uma Ilha Deserta</div>
                <div class="video-meta">MrBeast · 120M visualizações</div>
            </div>
        </div>

        <!-- Botões - AMBOS REDIRECIONAM PARA "assisir2/index.html" -->
        <div class="buttons-wrapper">
            <a href="../assisir2/index.html" class="btn-like">
                <svg class="icon-thumbs-up" viewBox="0 0 24 24">
                    <path d="M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2.76a2 2 0 0 0 1.79-1.11L12 2a3.13 3.13 0 0 1 3 3.88Z"></path>
                    <path d="M7 10v12"></path>
                </svg>
                Gostei
            </a>
            <a href="../assisir2/index.html" class="btn-dislike">
                <svg class="icon-thumbs-down" viewBox="0 0 24 24">
                    <path d="M9 18.12 10 14H4.17a2 2 0 0 1-1.92-2.56l2.33-8A2 2 0 0 1 6.5 2H20a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2h-2.76a2 2 0 0 0-1.79 1.11L12 22a3.13 3.13 0 0 1-3-3.88Z"></path>
                    <path d="M17 14V2"></path>
                </svg>
                Não gostei
            </a>
        </div>
    </div>
</body>
</html>
