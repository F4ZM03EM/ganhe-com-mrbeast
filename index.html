<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Program do MrBeast — Bem-vindo</title>
    <style>
        /* Reset e estilos base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        /* Logo */
        .logo {
            height: 144px;
            width: auto;
            margin-bottom: 40px;
        }

        /* Título */
        .title {
            font-size: 2.25rem;
            font-weight: 900;
            letter-spacing: -0.025em;
            color: #171717;
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 1rem;
            color: #404040;
            margin-bottom: 4px;
        }

        .subtitle-small {
            font-size: 0.875rem;
            color: #737373;
        }

        /* Botões e cards */
        .cards-wrapper {
            margin-top: 48px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card {
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: scale(1.01);
        }

        .card:active {
            transform: scale(0.99);
        }

        .card-primary {
            background: #dc2626;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .card-secondary {
            background: #f5f5f5;
            color: #737373;
        }

        .card-number {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .card-primary .card-number {
            background: rgba(255, 255, 255, 0.2);
        }

        .card-secondary .card-number {
            background: #d4d4d4;
            color: #525252;
        }

        .card-content {
            flex: 1;
            text-align: left;
        }

        .card-title {
            font-weight: 700;
            font-size: 1rem;
        }

        .card-primary .card-title {
            color: white;
        }

        .card-secondary .card-title {
            color: #404040;
        }

        .card-description {
            font-size: 0.75rem;
            color: inherit;
            opacity: 0.8;
        }

        .card-secondary .card-description {
            color: #737373;
        }

        .card-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        /* Texto pequeno */
        .small-text {
            margin-top: 4px;
            font-size: 0.75rem;
            color: #737373;
            text-align: center;
        }

        /* Segurança */
        .security-wrapper {
            margin-top: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #525252;
        }

        .shield-icon {
            width: 20px;
            height: 20px;
            color: #16a34a;
        }

        .security-text {
            font-weight: 700;
            color: #262626;
        }

        .security-subtext {
            margin-top: 4px;
            font-size: 0.75rem;
            color: #737373;
            max-width: 320px;
            margin-left: auto;
            margin-right: auto;
        }

        /* SVG inline para os ícones */
        .icon-arrow-right {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            flex-shrink: 0;
        }

        .icon-shield {
            width: 20px;
            height: 20px;
            stroke: #16a34a;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            flex-shrink: 0;
        }

        /* Responsividade */
        @media (max-width: 640px) {
            .title {
                font-size: 1.875rem;
            }
            
            .logo {
                height: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo -->
        <img src="imagem/mrbeast-logo.png" alt="Mr Beast Money Program" class="logo">

        <!-- Títulos -->
        <h1 class="title">Bem-vindo!</h1>
        <p class="subtitle">Que tal ganhar uma renda extra com o MrBeast?</p>
        <p class="subtitle-small">Vamos começar!</p>

        <!-- Cards -->
        <div class="cards-wrapper">
            <!-- Card 1 - Começar agora (REDIRECIONA PARA A PASTA "inscreve-se") -->
            <a href="inscreve-se/index.html" class="card card-primary">
                <span class="card-number">1</span>
                <span class="card-content">
                    <span class="card-title">Começar agora</span>
                </span>
                <svg class="icon-arrow-right" viewBox="0 0 24 24">
                    <path d="M5 12h14"></path>
                    <path d="m12 5 7 7-7 7"></path>
                </svg>
            </a>

            <!-- Card 2 - Resgatar prêmio -->
            <div class="card card-secondary">
                <span class="card-number">2</span>
                <span class="card-content">
                    <div class="card-title">Resgatar prêmio</div>
                    <div class="card-description">Complete as tarefas para liberar.</div>
                </span>
                <svg class="icon-arrow-right" viewBox="0 0 24 24">
                    <path d="M5 12h14"></path>
                    <path d="m12 5 7 7-7 7"></path>
                </svg>
            </div>
        </div>

        <p class="small-text">Simples, rápido e sem complicações.</p>

        <!-- Segurança -->
        <div class="security-wrapper">
            <svg class="icon-shield" viewBox="0 0 24 24">
                <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"></path>
                <path d="m9 12 2 2 4-4"></path>
            </svg>
            <span class="security-text">Seus dados estão 100% protegidos</span>
        </div>
        <p class="security-subtext">Este site é seguro e possui Certificado SSL. Seus dados estão sempre protegidos.</p>
    </div>
</body>
</html>
